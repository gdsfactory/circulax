theme:
    name: material
    features:
        - content.code.copy          # copy button on every code block
        - content.code.annotate      # inline (1) annotations in code blocks
        - content.tabs.link          # syncs tabbed sections across pages
        - navigation.tabs            # top horizontal tabs per top-level nav section
        - navigation.tabs.sticky     # tabs stay visible while scrolling
        - navigation.top             # back-to-top button when scrolling up
        - navigation.prune           # only render visible navigation items
        - header.autohide            # header disappears as you scroll
        - search.suggest             # autocomplete in search box
        - search.highlight           # highlight matches in search results
    logo: images/logo.svg
    font:
        text: Inter
        code: JetBrains Mono
    palette:
        - scheme: default
          primary: white
          accent: amber
          toggle:
             icon: material/weather-night
             name: Switch to dark mode
        - scheme: slate
          toggle:
             icon: material/weather-sunny
             name: Switch to light mode

    icon:
        repo: fontawesome/brands/github  # GitHub logo in top right

    #custom_dir: "docs/_overrides"  # Overriding part of the HTML

site_name: circulax
site_description: A Differentiable, Functional Circuit Analyzer based on JAX.

repo_url: https://github.com/gdsfactory/circulax
repo_name: gdsfactory/circulax

edit_uri: ""

strict: false  # Don't allow warnings during the build process

copyright: Copyright &copy; 2026 Chris Daunt

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js


plugins:
    - search:
        separator: '[\s\-,:!=\[\]()\"/]+|(?!\b)(?=[A-Z][a-z])|\\.(?!\d)|&[lg]t;'
    - gen-files:
        scripts:
            - docs/gen_doc_stubs.py
    - literate-nav:
        nav_file: SUMMARY.md
    - mkdocstrings:
        handlers:
            python:
                paths: [circulax]
                inventories:
                    - https://docs.jax.dev/en/latest/objects.inv
                    - https://docs.kidger.site/jaxtyping/objects.inv
                    - https://docs.python.org/3/objects.inv
                    - https://docs.xarray.dev/en/stable/objects.inv
                    - https://matplotlib.org/stable/objects.inv
                    - https://numpy.org/doc/stable/objects.inv
                    - https://pandas.pydata.org/docs/objects.inv
                    - https://python-markdown.github.io/objects.inv
                    - https://scipy.github.io/devdocs/objects.inv
                    - https://typing.readthedocs.io/en/latest/objects.inv
                    - https://www.mkdocs.org/objects.inv
                options:
                    docstring_options:
                        ignore_init_summary: true
                    docstring_section_style: table
                    docstring_style: google
                    filters: ["!^_"]
                    heading_level: 1
                    inherited_members: true
                    line_length: 88
                    merge_init_into_class: true
                    separate_signature: true
                    show_root_full_path: false
                    show_root_heading: true
                    show_signature_annotations: true
                    show_source: true
                    show_symbol_type_heading: true
                    show_symbol_type_toc: true
                    signature_crossrefs: true
                    summary: true

    - mkdocs_matplotlib
    - glightbox:
        touchNavigation: true
        loop: false
        effect: zoom
        width: 100%
        height: auto
        zoomable: true
        draggable: true
    - minify:
        minify_html: true


markdown_extensions:
    - pymdownx.arithmatex:
        generic: true
    - pymdownx.superfences
    - pymdownx.details
    - pymdownx.snippets:
        base_path: docs
    - admonition
    - toc:
        permalink: "¤"
        toc_depth: 3
    - attr_list
    - footnotes
    - pymdownx.emoji
    - pymdownx.highlight:
        anchor_linenums: true
        line_spans: __span
        pygments_lang_class: true
    - pymdownx.inlinehilite
    - pymdownx.magiclink
    - pymdownx.tabbed:
        alternate_style: true

hooks:
  - docs/hooks.py

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gdsfactory/circulax
