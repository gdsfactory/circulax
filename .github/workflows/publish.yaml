name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write      # needed to create/update GitHub Releases
  id-token: write

jobs:
  release-notes:
    name: "release / GitHub Release"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git-cliff needs full history to read all tags

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate release notes for this tag
        run: git cliff --current --strip header > RELEASE_NOTES.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          IS_PRE=${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}
          PRE_FLAG=""
          [ "$IS_PRE" = "true" ] && PRE_FLAG="--prerelease"
          if gh release view "$TAG" &>/dev/null; then
            # Release already exists (e.g. tagged via GitHub UI) — update its body
            gh release edit "$TAG" --notes-file RELEASE_NOTES.md $PRE_FLAG
          else
            gh release create "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md $PRE_FLAG
          fi

  build:
    name: "build / sdist + wheel"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # hatch-vcs needs full history to read the tag

      - uses: astral-sh/setup-uv@v5

      - name: Build sdist and wheel
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-testpypi:
    name: "publish / TestPyPI"
    runs-on: ubuntu-latest
    needs: build
    # Only runs for pre-release tags: v0.1.0a1, v0.1.0b2, v0.1.0rc1 etc.
    if: contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc')
    environment: testpypi

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  publish-pypi:
    name: "publish / PyPI"
    runs-on: ubuntu-latest
    needs: build
    # Only runs for stable tags: v0.1.0, v1.2.3 etc. (no a/b/rc suffix)
    if: "!contains(github.ref_name, 'a') && !contains(github.ref_name, 'b') && !contains(github.ref_name, 'rc')"
    environment: pypi

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
