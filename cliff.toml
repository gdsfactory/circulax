# git-cliff configuration for circulax
# Docs: https://git-cliff.org/docs/configuration
# Run:  pixi run changelog             (regenerate full CHANGELOG.md)
#       pixi run changelog-unreleased  (preview next release)

[changelog]
header = """
# Changelog

All notable changes to circulax are documented here.
Format follows [Keep a Changelog](https://keepachangelog.com/).
Versions follow [Semantic Versioning](https://semver.org/).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}**BREAKING** {% endif %}\
  {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
  {{ commit.message | upper_first }}\
  {% if commit.github.username %} ([@{{ commit.github.username }}](https://github.com/{{ commit.github.username }})){% endif %}\
  ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/gdsfactory/circulax/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = [
  # Strip Co-Authored-By trailers so they don't clutter messages
  { pattern = "Co-Authored-By:.*", replace = "" },
]
commit_parsers = [
  { message = "^feat",     group = "Added"      },
  { message = "^fix",      group = "Fixed"      },
  { message = "^refactor", group = "Changed"    },
  { message = "^perf",     group = "Changed"    },
  { message = "^docs",     group = "Documentation" },
  { message = "^test",     group = "Testing",   skip = true },
  { message = "^chore",    skip = true          },
  { message = "^ci",       skip = true          },
  { message = "^build",    skip = true          },
  { message = "^revert",   skip = true          },
  { message = "^style",    skip = true          },
]
protect_breaking_commits = true
filter_commits = true
# Tag pattern: v0.1.0, v1.2.3-rc.1, etc.
tag_pattern = "v[0-9].*"
skip_tags = "beta|alpha|rc"
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
